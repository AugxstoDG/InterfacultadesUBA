<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Interfacultades 2026 - Vóley Femenino</title>
    <style>
        /* Paleta UBA Deportes */
        body { margin: 0; font-family: Arial, sans-serif; background-color: #0b1a2a; color: white; display: flex; height: 100vh; }
        
        /* Menú Lateral */
        .sidebar { width: 280px; background-color: #06111d; padding: 20px; overflow-y: auto; border-right: 2px solid #1a365d; }
        .logo { font-size: 22px; font-weight: bold; margin-bottom: 40px; color: #ffffff; text-align: center; letter-spacing: 1px; }
        .menu-item { display: block; padding: 12px 10px; color: #d1d1d1; text-decoration: none; border-bottom: 1px solid #1a365d; font-size: 14px; font-weight: bold; transition: 0.2s; }
        .menu-item:hover { color: white; background-color: #1a365d; border-left: 5px solid #e74c3c; }
        .btn-reglamento { display: block; background-color: #9e2a5b; color: white; text-align: center; padding: 15px; margin-top: 40px; margin-bottom: 20px; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn-reglamento:hover { background-color: #7a1f45; }
        
        /* Contenedor Principal */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .contenedor-central { width: 100%; max-width: 1100px; }
        /* Título con acento rojo vóley */
        .titulo-jornada { color: #ffffff; font-size: 26px; text-align: center; border-bottom: 3px solid #e74c3c; padding-bottom: 15px; margin-top: 0; margin-bottom: 30px; text-transform: uppercase; }

        /* GRID DE DOS COLUMNAS */
        .layout-columnas { display: flex; gap: 30px; }
        .columna-izquierda { flex: 1; display: flex; flex-direction: column; gap: 25px; }
        .columna-derecha { flex: 1; }

        /* Estilos de las cajas */
        .bloque-liga { background-color: #06111d; border-radius: 6px; overflow: hidden; border: 1px solid #1a365d; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .titulo-liga { background-color: #1a365d; color: white; padding: 12px 15px; font-size: 15px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .iframe-fixture { width: calc(100% + 10px); margin-left: -5px; border: none; display: block; background: transparent; }

        /* FIXTURE INTERACTIVO CON ACENTO ROJO */
        .fixture-header { background-color: #e74c3c; padding: 15px; text-align: center; font-weight: bold; color: #ffffff; border-bottom: 2px solid #c0392b; }
        .navegacion-fechas { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 16px; }
        .btn-flecha { background: none; border: none; color: #ffffff; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn-flecha:hover { color: #f5b7b1; }
        .partido-fila { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #1a365d; font-size: 14px; }
        .partido-fila:last-child { border-bottom: none; }
